<!DOCTYPE html>
<html lang="en">
	<body>
	<style>
	.font_1 {
		background-color: black;
		color: yellow;
		font-size: large;
	}
	.font_2 {
		background-color: darkblue;
		color: white;
		font-size: medium;
	)
	.My_Style {
		background-color: black;
		color: red;
		text-decoration: underline;
		font-weight: bold;
		font-size: medium;
	}
	</style>
	<h2 class="font_1">This is styled per class attribute font_1</h2>
	<h3 class="font_2">This is styled per class attribute font_2</h3>
	<h4 class="font_1">This is styled per class attribute font_1 even though this is a h4 element</h4>
	<p class="My_Style">This paragraph is written in my style</p>
	</body>
</html>
